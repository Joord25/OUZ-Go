plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.ouzpose'
version = '0.7.10'

android {
  namespace "expo.modules.ouzpose"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Phase 0a: Google ML Kit Pose Detection (BlazePose 33pt).
  // 후속 커밋에서 OuzPose.kt 와 OuzPoseView.kt 가 사용 예정.
  implementation 'com.google.mlkit:pose-detection:18.0.0-beta5'
}
